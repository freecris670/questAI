# nixpacks.toml для Web сервиса - оптимизированный
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd ../.. && pnpm run build:web"]

[start]
cmd = "cd ../.. && node apps/web/server.js"

[variables]
NODE_ENV = "production"
PORT = "3000"
HOSTNAME = "0.0.0.0"

# Настройки здоровья сервиса
[healthcheck]
path = "/"
timeout = 300
