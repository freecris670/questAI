# nixpacks.toml для Web сервиса
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

# Установка зависимостей из корня монорепозитория
[phases.install]
cmds = [
  "cd /app && pnpm install --frozen-lockfile",
  "cd /app/packages/ui && pnpm run build"
]

# Сборка Web приложения согласно railway.txt
[phases.build]
dependsOn = ["install"]
cmds = ["cd /app/apps/web && pnpm run build"]

# Запуск Web сервиса согласно railway.txt
[start]
cmd = "cd /app/apps/web && pnpm run start"

# Переменные окружения по умолчанию
[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"

# Настройки здоровья сервиса
[healthcheck]
path = "/"
timeout = 300
