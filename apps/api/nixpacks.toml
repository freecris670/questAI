# nixpacks.toml для API сервиса
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

# Установка зависимостей из корня монорепозитория
[phases.install]
cmds = [
  "cd /app && pnpm install --frozen-lockfile",
  "cd /app/packages/ui && pnpm run build"
]

# Сборка API согласно railway.txt
[phases.build]
dependsOn = ["install"]
cmds = ["cd /app/apps/api && pnpm run build"]

# Запуск API сервиса согласно railway.txt
[start]
cmd = "cd /app/apps/api && pnpm run start:prod"

# Переменные окружения по умолчанию
# Railway автоматически предоставит остальные переменные
[variables]
NODE_ENV = "production"
