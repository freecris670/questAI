# nixpacks.toml для API сервиса - оптимизированный
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["cd ../.. && pnpm run build:api"]

[start]
cmd = "cd ../.. && node apps/api/dist/main.js"

[variables]
NODE_ENV = "production"
PORT = "3001"

# Настройки здоровья сервиса
[healthcheck]
path = "/api/health"
timeout = 300
