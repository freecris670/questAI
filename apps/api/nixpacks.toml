# nixpacks.toml для API сервиса - оптимизированный
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["--no-frozen-lockfile"]

[phases.build]
dependsOn = ["install"]
cmds = ["pnpm run build"]

[start]
cmd = "node dist/main.js"

[variables]
NODE_ENV = "production"
PORT = "3001"

# Настройки здоровья сервиса
[healthcheck]
path = "/api/health"
timeout = 300
