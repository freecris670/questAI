# railway.toml - оптимизированная Nixpacks конфигурация для монорепозитория QuestAI

[build]
builder = "NIXPACKS"
watchPatterns = [
  "apps/api/**", 
  "apps/web/**", 
  "packages/ui/**", 
  "package.json", 
  "pnpm-lock.yaml",
  "turbo.json",
  "nixpacks.toml"
]

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Определение сервисов для монорепозитория с оптимизированными watch paths
[[services]]
name = "api"
root = "apps/api"
watchPatterns = [
  "apps/api/**", 
  "packages/ui/**", 
  "package.json",
  "pnpm-lock.yaml"
]

[[services]]
name = "web"  
root = "apps/web"
watchPatterns = [
  "apps/web/**", 
  "packages/ui/**", 
  "package.json",
  "pnpm-lock.yaml"
]
