# railway.toml - конфигурация для монорепозитория QuestAI

[build]
builder = "DOCKERFILE"
watchPatterns = ["apps/**", "packages/**"]

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Определение сервисов для монорепозитория
[[services]]
name = "api"
root = "apps/api"
dockerfile = "Dockerfile"

[[services]]
name = "web"  
root = "apps/web"
dockerfile = "Dockerfile"
