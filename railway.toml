[build]
builder = "nixpacks"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Для API сервиса
[[services]]
name = "api"
buildCommand = "turbo run build --filter=@questai/api"
startCommand = "turbo run start --filter=@questai/api"

[services.env]
PORT = 3001
NODE_ENV = "production"
