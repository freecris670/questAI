# nixpacks.toml - Конфигурация для монорепозитория QuestAI
# Этот файл используется как базовая конфигурация
# Каждый сервис (API и Web) имеет свой nixpacks.toml в своей директории

# Используем Node.js 20 и pnpm
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

# Установка зависимостей для всего монорепозитория
[phases.install]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "cd packages/ui && pnpm run build"
]

# Сборка определяется в конфигурации каждого сервиса
[phases.build]
dependsOn = ["install"]
# Команда сборки переопределяется в nixpacks.toml каждого сервиса

# Команда запуска переопределяется в настройках каждого сервиса Railway
[start]
# Команда запуска переопределяется в nixpacks.toml каждого сервиса

# Базовые переменные окружения
[variables]
NODE_ENV = "production"
